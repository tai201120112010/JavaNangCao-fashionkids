<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quan Ly Ma Giam Gia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .admin-navbar {
            background: linear-gradient(135deg, #182848, #4b6cb7);
        }
        .admin-nav-link {
            color: rgba(255, 255, 255, 0.88);
            font-weight: 500;
            border-radius: 999px;
            padding: 0.55rem 1rem !important;
        }
        .admin-nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.14);
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

<div class="container py-4">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between mb-4">
            <h2 class="text-primary fw-bold">Quản lý mã giảm giá</h2>
        </div>

        <form th:action="@{/admin/discounts/add}" method="post" class="row g-3 mb-4 bg-light p-3 rounded border">
            <div class="col-md-5">
                <input type="text" name="code" class="form-control" placeholder="Mã giảm giá (VD: HE2026)" required>
            </div>
            <div class="col-md-4">
                <div class="input-group">
                    <input type="number" name="percentage" class="form-control" placeholder="Phần trăm (%)" min="1" max="100" required>
                    <span class="input-group-text">%</span>
                </div>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-success w-100">+ Thêm mã</button>
            </div>
        </form>

        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Code</th>
                <th>Giảm giá (%)</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="d : ${discounts}">
                <td class="fw-bold text-danger" th:text="${d.code}"></td>
                <td th:text="${d.percentage} + '%'"></td>
                <td><span class="badge bg-success">Đang hoạt động</span></td>
                <td>
                    <a th:href="@{'/admin/discounts/delete/' + ${d.id}}"
                       class="btn btn-sm btn-outline-danger" onclick="return confirm('Xóa mã này?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
