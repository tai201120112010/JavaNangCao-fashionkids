<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Danh Mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .admin-navbar {
            background: linear-gradient(135deg, #182848, #4b6cb7);
        }
        .admin-nav-link {
            color: rgba(255, 255, 255, 0.88);
            font-weight: 500;
            border-radius: 999px;
            padding: 0.55rem 1rem !important;
        }
        .admin-nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.14);
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

<div class="container py-4">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary fw-bold m-0">Quản lý danh mục</h2>
        </div>

        <form th:action="@{/admin/categories/save}" th:object="${category}" method="get"
              class="row g-3 mb-4 bg-light p-3 rounded border">
            <input type="hidden" th:field="*{id}">
            <div class="col-md-4">
                <input type="text" th:field="*{name}" class="form-control" placeholder="Tên danh mục" required>
            </div>
            <div class="col-md-6">
                <input type="text" th:field="*{description}" class="form-control" placeholder="Mô tả danh mục">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-success w-100"
                        th:text="${category.id != null} ? 'Cập nhật' : '+ Thêm'">+ Thêm</button>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên danh mục</th>
                    <th>Mô tả</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${categories}">
                    <td th:text="${c.id}">1</td>
                    <td class="fw-semibold" th:text="${c.name}">Áo bé trai</td>
                    <td th:text="${c.description} ?: 'Không có mô tả'">Mô tả</td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{'/admin/categories/edit/' + ${c.id}}" class="btn btn-sm btn-outline-primary">
                                Sửa
                            </a>
                            <a th:href="@{'/admin/categories/delete/' + ${c.id}}" class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Bạn có chắc chắn muốn xóa danh mục này?')">
                                Xóa
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(categories)}" class="alert alert-warning text-center mb-0">
            Chưa có danh mục nào trong hệ thống
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
