<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - Fashion Kids</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-navbar {
            background: linear-gradient(135deg, #182848, #4b6cb7);
        }
        .admin-nav-link {
            color: rgba(255, 255, 255, 0.88);
            font-weight: 500;
            border-radius: 999px;
            padding: 0.55rem 1rem !important;
        }
        .admin-nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.14);
        }
        .stat-card { border: none; border-radius: 15px; transition: 0.3s; color: white; }
        .stat-card:hover { transform: translateY(-5px); }
        .bg-revenue { background: linear-gradient(45deg, #e64a19, #ff7043); }
        .bg-orders { background: linear-gradient(45deg, #1976d2, #42a5f5); }
        .bg-products { background: linear-gradient(45deg, #388e3c, #66bb6a); }
        .bg-users { background: linear-gradient(45deg, #fbc02d, #ffeb3b); color: #333 !important; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

<div class="container-fluid py-4">
    <h2 class="mb-4 fw-bold">📊 Thống kê hệ thống</h2>

    <div class="row g-3 mb-5">
        <div class="col-md-3">
            <div class="card stat-card bg-revenue p-3">
                <h5>Tổng doanh thu</h5>
                <h3 th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card bg-orders p-3">
                <h5>Đơn hàng</h5>
                <h3 th:text="${totalOrders}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card bg-products p-3">
                <h5>Sản phẩm</h5>
                <h3 th:text="${totalProducts}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card bg-users p-3">
                <h5>Khách hàng</h5>
                <h3 th:text="${totalUsers}">0</h3>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card p-4 border-0 shadow-sm" style="border-radius: 15px;">
                <h5 class="fw-bold mb-3">Biểu đồ doanh thu 6 tháng gần nhất</h5>
                <canvas id="revenueChart"></canvas>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4 border-0 shadow-sm" style="border-radius: 15px;">
                <h5 class="fw-bold mb-3">Thông báo mới</h5>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item small">🚀 Có 5 đơn hàng mới chờ duyệt</li>
                    <li class="list-group-item small">⚠️ 2 sản phẩm sắp hết hàng</li>
                    <li class="list-group-item small">👤 10 thành viên mới trong hôm nay</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // Lấy dữ liệu từ Model truyền sang JS
    const revenueData = [[${chartData}]];

    const ctx = document.getElementById('revenueChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6'],
            datasets: [{
                label: 'Doanh thu (VNĐ)',
                data: revenueData,
                borderColor: '#e64a19',
                backgroundColor: 'rgba(230, 74, 25, 0.1)',
                borderWidth: 3,
                fill: true,
                tension: 0.4 // Làm mượt đường kẻ
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });
</script>

</body>
</html>
