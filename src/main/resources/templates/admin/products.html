<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .admin-navbar {
            background: linear-gradient(135deg, #182848, #4b6cb7);
        }
        .admin-nav-link {
            color: rgba(255, 255, 255, 0.88);
            font-weight: 500;
            border-radius: 999px;
            padding: 0.55rem 1rem !important;
        }
        .admin-nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.14);
        }
        .product-img {
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

<div class="container py-4">
    <div class="card shadow-sm p-4 border-0">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary fw-bold m-0">Quản lý sản phẩm</h2>
            <a href="/admin/products/add" class="btn btn-success px-4 shadow-sm">+ Thêm sản phẩm</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Tên sản phẩm</th>
                    <th>Giá gốc</th>
                    <th>Giá giảm</th>
                    <th>Giá bán</th>
                    <th class="text-center">Hình ảnh</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <td class="fw-semibold" th:text="${p.name}">Tên sản phẩm</td>
                    <td class="fw-bold"
                        th:text="${#numbers.formatDecimal(p.originalPrice > 0 ? p.originalPrice : p.price, 0, 'COMMA', 0, 'POINT') + ' VND'}">0 VND</td>
                    <td class="text-success fw-bold"
                        th:text="${#numbers.formatDecimal((p.originalPrice > 0 ? p.originalPrice : p.price) - p.price, 0, 'COMMA', 0, 'POINT') + ' VND'}">0 VND</td>
                    <td class="text-danger fw-bold"
                        th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + ' VND'}">0 VND</td>
                    <td class="text-center">
                        <img th:src="${p.image != null ? p.image : 'https://via.placeholder.com/80'}"
                             width="80" height="80" class="product-img" alt="Ảnh sản phẩm" />
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{'/admin/products/edit/' + ${p.id}}" class="btn btn-sm btn-outline-primary">
                                Sửa
                            </a>
                            <a th:href="@{'/admin/products/delete/' + ${p.id}}" class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')">
                                Xóa
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(products)}" class="alert alert-warning text-center mb-0">
            Chưa có sản phẩm nào trong hệ thống
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
