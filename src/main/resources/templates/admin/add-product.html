<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm sản phẩm mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: none;
            margin-top: 30px;
            margin-bottom: 50px;
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card form-card">
                <div class="card-header text-center">
                    <h3 class="m-0">Thêm sản phẩm mới</h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/products/save}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên sản phẩm</label>
                            <input type="text" name="name" class="form-control form-control-lg" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Giá gốc</label>
                            <div class="input-group">
                                <input type="number" name="originalPrice" class="form-control" min="0" step="0.01" required />
                                <span class="input-group-text">VND</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Giảm giá (%)</label>
                            <div class="input-group">
                                <input type="number" name="discountPercent" class="form-control" min="0" max="100" step="0.01" value="0" required />
                                <span class="input-group-text">%</span>
                            </div>
                            <div class="form-text">Giá bán = giá gốc * (1 - giảm giá / 100).</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Giá bán</label>
                            <div class="input-group">
                                <input type="text" id="salePricePreview" class="form-control" readonly />
                                <span class="input-group-text">VND</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Danh mục</label>
                            <select name="categoryId" class="form-select" required>
                                <option value="">Chọn danh mục</option>
                                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}">Danh mục</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Đường dẫn ảnh</label>
                            <input type="text" name="image" class="form-control" placeholder="https://example.com/image.jpg" />
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Mô tả sản phẩm</label>
                            <textarea name="description" class="form-control" rows="4"></textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary shadow-sm">Lưu</button>
                            <button type="reset" class="btn btn-light text-muted">Làm trống form</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const originalPriceInput = document.querySelector('input[name="originalPrice"]');
    const discountPercentInput = document.querySelector('input[name="discountPercent"]');
    const salePricePreview = document.getElementById('salePricePreview');

    function formatDisplayNumber(value) {
        if (!Number.isFinite(value)) {
            return "0";
        }
        return value.toLocaleString("en-US", {
            useGrouping: false,
            minimumFractionDigits: 0,
            maximumFractionDigits: 10
        });
    }

    function updateSalePricePreview() {
        const originalPrice = parseFloat(originalPriceInput.value) || 0;
        const discountPercent = Math.min(100, Math.max(0, parseFloat(discountPercentInput.value) || 0));
        salePricePreview.value = formatDisplayNumber(originalPrice * (1 - discountPercent / 100));
    }

    originalPriceInput.addEventListener('input', updateSalePricePreview);
    discountPercentInput.addEventListener('input', updateSalePricePreview);
    updateSalePricePreview();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
