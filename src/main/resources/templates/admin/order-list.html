<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .admin-navbar {
            background: linear-gradient(135deg, #182848, #4b6cb7);
        }
        .admin-nav-link {
            color: rgba(255, 255, 255, 0.88);
            font-weight: 500;
            border-radius: 999px;
            padding: 0.55rem 1rem !important;
        }
        .admin-nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.14);
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-pending {
            background: #fff3e0;
            color: #ef6c00;
        }
        .status-completed {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-cancelled {
            background: #ffebee;
            color: #c62828;
        }
        .update-form {
            display: flex;
            gap: 5px;
        }
        .update-form select {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .btn-save {
            background: #4caf50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .product-list {
            margin: 0;
            padding-left: 18px;
        }
        .product-list li {
            margin-bottom: 4px;
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

<div class="container py-4">
    <div class="card shadow-sm p-4 border-0">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary fw-bold m-0">Quản lý đơn hàng</h2>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Khách hàng</th>
                    <th>Liên hệ</th>
                    <th>Địa chỉ giao hàng</th>
                    <th>Sản phẩm đặt</th>
                    <th>Tổng giá</th>
                    <th>Ngày đặt</th>
                    <th>Trạng thái</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td class="fw-bold" th:text="'#' + ${order.id}">#1</td>
                    <td th:text="${order.customerName}">Nguyễn Văn A</td>
                    <td th:text="${order.phone}">0900000000</td>
                    <td th:text="${order.address}" style="max-width: 220px; white-space: normal;">TP.HCM</td>
                    <td>
                        <ul class="product-list" th:if="${!#lists.isEmpty(order.orderDetails)}">
                            <li th:each="detail : ${order.orderDetails}"
                                th:text="${detail.product.name + ' x' + detail.quantity}">Sản phẩm x1</li>
                        </ul>
                        <span th:if="${#lists.isEmpty(order.orderDetails)}" class="text-muted">Không có chi tiết</span>
                    </td>
                    <td class="text-danger fw-bold"
                        th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</td>
                    <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">06/04/2026 20:00</td>
                    <td>
                        <span th:class="'status-badge ' +
                          (${order.status} == 'PENDING' ? 'status-pending' :
                          (${order.status} == 'DELIVERED' ? 'status-completed' : 'status-cancelled'))"
                              th:text="${order.status}">PENDING</span>
                    </td>
                    <td class="text-center">
                        <form th:action="@{/admin/orders/update-status}" method="post" class="update-form justify-content-center">
                            <input type="hidden" name="orderId" th:value="${order.id}">
                            <select name="status">
                                <option value="PENDING" th:selected="${order.status == 'PENDING'}">Chờ xác nhận</option>
                                <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">Đã giao hàng</option>
                                <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">Hủy đơn</option>
                            </select>
                            <button type="submit" class="btn-save">Lưu</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(orders)}" class="alert alert-warning text-center mb-0">
            Chưa có đơn hàng nào trong hệ thống
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
