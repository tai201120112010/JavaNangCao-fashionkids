<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .edit-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            margin-top: 30px;
            margin-bottom: 50px;
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
        }
        .preview-img {
            max-width: 150px;
            border-radius: 10px;
            margin-top: 10px;
            display: block;
            border: 2px solid #dee2e6;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card edit-card">
                <div class="card-header text-center">
                    <h3 class="m-0">Cập nhật sản phẩm</h3>
                    <small class="opacity-75">ID: <span th:text="${product.id}">0</span></small>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/products/update}" method="post">
                        <input type="hidden" name="id" th:value="${product.id}" />
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên sản phẩm</label>
                            <input type="text" name="name" class="form-control form-control-lg" th:value="${product.name}" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Giá gốc</label>
                            <div class="input-group">
                                <input type="number" name="originalPrice" class="form-control"
                                       th:value="${T(java.math.BigDecimal).valueOf(product.originalPrice > 0 ? product.originalPrice : product.price).stripTrailingZeros().toPlainString()}"
                                       min="0" step="0.01" required />
                                <span class="input-group-text bg-light">VND</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Giảm giá (%)</label>
                            <div class="input-group">
                                <input type="number" name="discountPercent" class="form-control"
                                       th:value="${T(java.math.BigDecimal).valueOf(product.discountPercent).stripTrailingZeros().toPlainString()}" min="0" max="100" step="0.01" required />
                                <span class="input-group-text bg-light">%</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Giá bán</label>
                            <div class="input-group">
                                <input type="text" id="salePricePreview" class="form-control"
                                       th:value="${T(java.math.BigDecimal).valueOf(product.price).stripTrailingZeros().toPlainString()}" readonly />
                                <span class="input-group-text bg-light">VND</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Danh mục</label>
                            <select name="categoryId" class="form-select" required>
                                <option value="">Chọn danh mục</option>
                                <option th:each="category : ${categories}"
                                        th:value="${category.id}"
                                        th:text="${category.name}"
                                        th:selected="${category.id == product.categoryId}">Danh mục</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Đường dẫn ảnh</label>
                            <input type="text" name="image" id="imageUrl" class="form-control" th:value="${product.image}" placeholder="https://..." />
                            <img th:src="${product.image != null ? product.image : 'https://via.placeholder.com/150'}" id="imgPreview" class="preview-img" alt="Preview" />
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Mô tả sản phẩm</label>
                            <textarea name="description" class="form-control" rows="4" th:text="${product.description}"></textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm">Cập nhật</button>
                            <a href="/admin/products" class="btn btn-light border">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const imgUrlInput = document.getElementById('imageUrl');
    const imgPreview = document.getElementById('imgPreview');
    const originalPriceEditInput = document.querySelector('input[name="originalPrice"]');
    const discountPercentEditInput = document.querySelector('input[name="discountPercent"]');
    const salePricePreview = document.getElementById('salePricePreview');

    imgUrlInput.addEventListener('input', function () {
        imgPreview.src = this.value || 'https://via.placeholder.com/150';
    });

    function formatDisplayNumber(value) {
        if (!Number.isFinite(value)) {
            return "0";
        }
        return value.toLocaleString("en-US", {
            useGrouping: false,
            minimumFractionDigits: 0,
            maximumFractionDigits: 10
        });
    }

    function updateSalePricePreview() {
        const originalPrice = parseFloat(originalPriceEditInput.value) || 0;
        const discountPercent = Math.min(100, Math.max(0, parseFloat(discountPercentEditInput.value) || 0));
        salePricePreview.value = formatDisplayNumber(originalPrice * (1 - discountPercent / 100));
    }

    originalPriceEditInput.addEventListener('input', updateSalePricePreview);
    discountPercentEditInput.addEventListener('input', updateSalePricePreview);
    updateSalePricePreview();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
