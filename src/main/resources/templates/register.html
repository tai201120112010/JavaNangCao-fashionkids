<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - Fashion Kids</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
                              url('https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .register-box::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #e64a19;
        }

        .logo-home {
            font-size: 24px;
            color: #e64a19;
            text-decoration: none;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        h2 {
            color: #333;
            margin-bottom: 8px;
            font-size: 26px;
            font-weight: 700;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #e64a19;
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border-radius: 12px;
            border: 2px solid #eee;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
            background: #fdfdfd;
        }

        input:focus {
            border-color: #e64a19;
            background: #fff;
            box-shadow: 0 0 8px rgba(230, 74, 25, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #e64a19;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(230, 74, 25, 0.2);
            margin-top: 10px;
        }

        button:hover {
            background: #bf360c;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 74, 25, 0.3);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 14px;
            color: #555;
        }

        .footer-links a {
            color: #e64a19;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .decoration-icons {
            font-size: 20px;
            margin-bottom: 15px;
            color: #ffb74d;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 18px;
            text-align: left;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>

<div class="register-box">
    <a th:href="@{/shop}" class="logo-home">Fashion Kids</a>

    <div class="decoration-icons">
        <i class="fas fa-baby"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-magic"></i>
        <i class="fas fa-gift"></i>
    </div>

    <h2>Đăng ký thành viên</h2>
    <p class="subtitle">Tạo tài khoản đề nhận nhiều ưu đãi đặc biệt</p>

    <div th:if="${errorMessage}" class="message error" th:text="${errorMessage}"></div>

    <form th:action="@{/register}" method="post">
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" name="username" th:value="${enteredUsername}" placeholder="Tên đăng nhập" required />
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Mật khẩu" required />
        </div>

        <div class="input-group">
            <i class="fas fa-check-double"></i>
            <input type="password" name="confirmPassword" placeholder="Xác nhận mật khẩu" required />
        </div>

        <button type="submit">ĐĂNG KÝ NGAY</button>
    </form>

    <div class="footer-links">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a>
    </div>
</div>

</body>
</html>
